name: Refresh orbital data

on:
  schedule:
    - cron: '17 6 * * *'   # daily at 06:17 UTC
  workflow_dispatch: {}     # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Rebuild site with latest TLEs
        run: python3 build.py

      - name: Commit & push if elements changed
        run: |
          git config user.name  "ast-tracker-bot"
          git config user.email "ast-tracker-bot@users.noreply.github.com"
          if git diff --quiet -- index.html live_tles.json; then
            echo "No element changes since last run."
          else
            git add index.html live_tles.json
            git commit -m "Auto-refresh orbital elements ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
